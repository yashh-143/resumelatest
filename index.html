<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Resume Builder Pro</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100">
  <div id="root"></div>

  <script type="text/babel">

const { useState, useEffect } = React;

// Simple icons replacement
const Icon = ({label}) => <span className="text-xs">{label}</span>;

const INITIAL_STATE = {
  personal: {
    fullName: "Jonathan Sterling",
    email: "sterling.j@example.com",
    phone: "+1 555 123 4567",
    address: "New York",
    summary: "Senior Product Manager with 8+ years experience."
  },
  experience: [
    {
      id: Date.now(),
      role: "Product Manager",
      company: "Nexus",
      description: "Built dashboards and improved growth."
    }
  ],
  skills: ["React", "SQL", "Product Strategy"]
};

function App() {
  const [data, setData] = useState(() => {
    const saved = localStorage.getItem("resume");
    return saved ? JSON.parse(saved) : INITIAL_STATE;
  });

  useEffect(() => {
    localStorage.setItem("resume", JSON.stringify(data));
  }, [data]);

  const updatePersonal = (field, value) => {
    setData(prev => ({
      ...prev,
      personal: {...prev.personal, [field]: value}
    }));
  };

  const updateExp = (id, field, value) => {
    setData(prev => ({
      ...prev,
      experience: prev.experience.map(e =>
        e.id === id ? {...e, [field]: value} : e
      )
    }));
  };

  const addExperience = () => {
    setData(prev => ({
      ...prev,
      experience: [...prev.experience, {
        id: Date.now(),
        role: "",
        company: "",
        description: ""
      }]
    }));
  };

  const removeExp = (id) => {
    setData(prev => ({
      ...prev,
      experience: prev.experience.filter(e => e.id !== id)
    }));
  };

  return (
    <div className="flex flex-col md:flex-row h-screen">

      {/* Sidebar */}
      <div className="w-full md:w-1/2 p-6 bg-white overflow-auto">
        <h1 className="text-xl font-bold mb-4">Resume Builder</h1>

        <input
          className="w-full border p-2 mb-2"
          placeholder="Full Name"
          value={data.personal.fullName}
          onChange={e => updatePersonal("fullName", e.target.value)}
        />

        <input
          className="w-full border p-2 mb-2"
          placeholder="Email"
          value={data.personal.email}
          onChange={e => updatePersonal("email", e.target.value)}
        />

        <textarea
          className="w-full border p-2 mb-4"
          placeholder="Summary"
          value={data.personal.summary}
          onChange={e => updatePersonal("summary", e.target.value)}
        />

        <h2 className="font-bold mb-2">Experience</h2>

        {data.experience.map(exp => (
          <div key={exp.id} className="border p-3 mb-3 rounded">
            <input
              className="w-full border p-1 mb-1"
              placeholder="Role"
              value={exp.role}
              onChange={e => updateExp(exp.id, "role", e.target.value)}
            />
            <input
              className="w-full border p-1 mb-1"
              placeholder="Company"
              value={exp.company}
              onChange={e => updateExp(exp.id, "company", e.target.value)}
            />
            <textarea
              className="w-full border p-1"
              placeholder="Description"
              value={exp.description}
              onChange={e => updateExp(exp.id, "description", e.target.value)}
            />
            <button
              className="text-red-500 text-xs mt-2"
              onClick={() => removeExp(exp.id)}
            >
              Delete
            </button>
          </div>
        ))}

        <button
          onClick={addExperience}
          className="bg-blue-500 text-white px-4 py-2 rounded"
        >
          Add Experience
        </button>
      </div>

      {/* Preview */}
      <div className="w-full md:w-1/2 p-8 bg-gray-50 overflow-auto">
        <div className="bg-white shadow p-6">
          <h1 className="text-2xl font-bold">
            {data.personal.fullName}
          </h1>
          <p className="text-sm">{data.personal.email}</p>

          <p className="mt-4 text-sm">
            {data.personal.summary}
          </p>

          <h2 className="mt-6 font-bold">Experience</h2>
          {data.experience.map(exp => (
            <div key={exp.id} className="mt-2">
              <h3 className="font-semibold">{exp.role}</h3>
              <p className="text-xs">{exp.company}</p>
              <p className="text-xs">{exp.description}</p>
            </div>
          ))}

          <h2 className="mt-6 font-bold">Skills</h2>
          <div className="flex flex-wrap gap-2 mt-2">
            {data.skills.map((s, i) => (
              <span key={i} className="bg-gray-200 px-2 py-1 text-xs rounded">
                {s}
              </span>
            ))}
          </div>
        </div>
      </div>

    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

  </script>
</body>
</html>
